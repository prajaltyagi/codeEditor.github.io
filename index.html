<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0px;
      margin: 0px;
    }
    .body{
      background-color: rgb(71, 70, 70) ;

      height: 100vh;
      width: 100%;
    }
    #btn{
      display: none;
      background-color: rgb(24, 98, 236);
      border: none;
      outline: none;
      width: 300px;
height: 40px;
margin-top:20px;
border-radius: 10px;
    }
    #btn a{
      color: whitesmoke;
      text-decoration: none;
    }
    #txt{
      width: 500px;
      height: 50px;
      padding: 5px;
      outline: none;
      border: none;
      background: linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.1));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: whitesmoke;
      text-align: center;
      border-radius: 5px;
      margin-top: 2%;
    }
    ::placeholder{
      color: rgb(182, 178, 178);
    }
    span{
      color: rgb(238, 170, 22);
    }
    
  </style>
</head>
<body>
  <div class="body">
    <center>
      <img src="images/icon.jpg" width="80px" style="border-radius: 50%; margin-top: 12%; " >
<form action="#" autocomplete="off" >
  <input type="text" id="txt" placeholder="'yes' or 'no' for webDevelopment in CodeBlocks " oninput="validation()"><br><br>
  <span id="txtmsg"></span><br>
 
  <button id="btn"><a href="editor.html">Start Coding</a></button>

</form>
</center>
  </div>
  <script>
    function validation(){
      let txt=document.getElementById('txt').value;
      let btn=document.getElementById('btn');
let txtmsg=document.getElementById('txtmsg');



if(txt!='no'){
  document.getElementById('txtmsg').innerHTML="**Invaild answer only 'yes' or 'no'is accepted **";
  btn.style.display="none";
}
if(txt!='yes'){
  document.getElementById('txtmsg').innerHTML="**Invaild answer only 'yes' or 'no'is accepted **";
  btn.style.display="none";
}
if(txt=='no'){
  document.getElementById('txtmsg').innerHTML="**Sorry this only for Web Development **";
  btn.style.display="none";
}
if(txt==''){
  document.getElementById('txtmsg').innerHTML="**Please fill the box according to your choice**";
  btn.style.display="none";
}
if(txt=='yes'){
  document.getElementById('txtmsg').innerHTML="**Now you can code by click on the button**";
  btn.style.display="block";
}
    }
  </script>
</body>
</html>
