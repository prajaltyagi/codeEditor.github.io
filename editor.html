<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .body{
            background-color: rgb(46, 45, 45) ;

width: 100%;
height: 100vh;
        }
        .header,.img{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 20px 10px 10px;
            background-color: rgb(73, 72, 72);
        }
        .img{
            padding: 0px;
            border: none;
            box-shadow: none;
        }
        .img p{
            padding: 0px 0px 0px 10px;
            color: whitesmoke;
            font-size: 30px;
            
        }
        .main{
            display: flex;
            align-items: center;
           gap: 20%;
            justify-content: center;
            padding: 20px 20px 0px 20px;
          
        }
        .main1{
            flex-basis: 50%;

        }
        .main1 textarea{
            width: 100%;
            height: 160px;
            resize: none;
            outline: none;
            padding: 10px 10px 0px 10px;
            background-color: rgb(54, 54, 54);
            border-radius: 5px;
border: none;
border-radius: 5px;
        }
        
        
      #html,  #html::placeholder{
color: orangered;

        }
       #css, #css::placeholder{
            color: rgb(0, 119, 255);
        }
      #js,  #js::placeholder{
            color: yellowgreen;
        }
        .main2 p{
color: whitesmoke;
padding: 5px;
        }
        #output{
            width: 600px;
            height: 400px;
            padding: 0px;
            background-color: white;
            border: none;
border-radius: 5px;
        }
        #btn{
      background-color: rgba(238, 66, 74, 0.986);
      border: none;
      outline: none;
      width: 200px;
height: 40px;

border-radius: 10px;
    }
    #btn:hover{
        background-color: rgb(247, 2, 15);  
    }
    #btn a{
        color: whitesmoke;
        text-decoration: none;
    }
    </style>
</head>
<body>
    <div class="body">
<div class="header">
    <div class="img" >
   <a href="index.html"><img src="images/icon.jpg" width="50px" style="border-radius: 50%; " ></a> 
    <p>CodeBlocks</p>
</div>
    <table>
        <tr>
        <td><img src="images/html.png" width="30px"></td>
        <td><img src="images/css.webp" width="30px"></td>
        <td><img src="images/js.png" width="30px"></td>
    </tr>
    </table>
</div>

<div class="main">
    <div class="main1">
<textarea  id="html" placeholder="Write HTML code..." onkeyup="run()"></textarea>
<textarea  id="css" placeholder="Write CSS code..." onkeyup="run()" ></textarea>
<textarea  id="js" placeholder="Write JS code..." onkeyup="run()" ></textarea>
    </div>
    <div class="main2">
<p>Output Screen</p>
<iframe id="output"></iframe>
<button id="btn"><a href="index.html">Logout</a></button>
    </div>
</div>
    </div>
    <script>
     
        function run(){
            let html=document.getElementById('html').value;
        let css=document.getElementById('css').value;
        let js=document.getElementById('js').value;
let output=document.getElementById('output');
output.contentDocument.body.innerHTML=html+"<style>"+css+"</style>";
output.contentWindow.eval(js);
        }
    </script>
</body>
</html>
